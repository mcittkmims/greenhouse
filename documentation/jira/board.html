<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local Jira Board</title>
<link rel="stylesheet" href="./board.css">
</head>
<body class="aui-layout aui-theme-default ghx-agile ghx-rapid-views">
  <div id="page" class="app-shell">
    <nav class="aui-header" aria-label="Site">
      <div class="aui-header-inner">
        <div class="aui-header-before">
          <div class="app-switcher">GMS</div>
          <div class="aui-header-logo">Jira</div>
          <div class="board-shell-badge">Kanban Board</div>
        </div>
        <div class="aui-header-primary">
          <button class="aui-button aui-button-primary" id="create-issue-trigger" type="button">Create</button>
        </div>
      </div>
    </nav>

    <div class="project-layout">
      <main class="board-shell">
        <header class="board-toolbar">
          <div class="board-toolbar-main">
            <h1 id="board-title">04 GMS Board</h1>
            <div class="board-meta" id="meta-text">Waiting for local Jira server...</div>
          </div>
          <div class="board-toolbar-actions">
            <input id="search-input" class="jira-search" type="search" placeholder="Search board">
            <button class="aui-button" id="refresh-btn" type="button">Refresh</button>
            <a class="aui-button" id="open-online-link" href="#" target="_blank" rel="noreferrer">Open in Jira</a>
          </div>
        </header>

        <div class="board-content">
          <section class="ghx-board-area">
            <div class="ghx-board" id="board"></div>
          </section>
          <aside class="issue-detail-panel" id="issue-detail-panel" aria-label="Issue details" hidden>
            <div class="issue-detail-panel-topbar">
              <div class="issue-detail-panel-label">Issue details</div>
              <button class="icon-close" id="close-issue-panel" type="button" aria-label="Close issue details">x</button>
            </div>
            <div class="detail-empty" id="detail-empty">Loading issue...</div>
            <div class="issue-view" id="issue-view" hidden></div>
          </aside>
        </div>
      </main>
    </div>
  </div>

  <div class="status-banner" id="status-banner"></div>

  <div class="error-overlay" id="error-overlay">
    <div class="error-panel">
      <h3>Local Jira server is not running</h3>
      <p>Start the server, then this page will connect automatically.</p>
      <pre>python3 scripts/jira/jira_board_server.py</pre>
      <p style="margin-top:12px;color:#5e6c84;font-size:12px;">Retrying every 3 seconds&hellip;</p>
      <button class="aui-button aui-button-primary" id="retry-connect-btn" type="button" style="margin-top:8px;">Retry now</button>
    </div>
  </div>

  <dialog class="create-dialog" id="create-dialog">
    <form method="dialog" class="create-dialog-card" id="create-issue-form">
      <header class="dialog-header">
        <h2>Create Issue</h2>
        <button class="icon-close" type="button" id="close-create-dialog" aria-label="Close">x</button>
      </header>
      <div class="dialog-body">
        <label>
          <span>Summary</span>
          <input id="create-summary" name="summary" required>
        </label>
        <label>
          <span>Issue Type</span>
          <select id="create-issue-type" name="issueType">
            <option value="Task">Task</option>
            <option value="Story">Story</option>
            <option value="User Story">User Story</option>
            <option value="Job Story">Job Story</option>
            <option value="Epic">Epic</option>
            <option value="Bug">Bug</option>
          </select>
        </label>
        <label>
          <span>Assignee Username</span>
          <input id="create-assignee" name="assigneeName">
        </label>
        <label>
          <span>Priority</span>
          <select id="create-priority" name="priority">
            <option value="">None</option>
            <option value="Highest">Highest</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
            <option value="Lowest">Lowest</option>
          </select>
        </label>
        <label>
          <span>Labels</span>
          <input id="create-labels" name="labels" placeholder="comma,separated,labels">
        </label>
        <label>
          <span>Due Date</span>
          <input id="create-due-date" name="dueDate" type="date">
        </label>
        <label>
          <span>Description</span>
          <textarea id="create-description" name="description"></textarea>
        </label>
      </div>
      <footer class="dialog-footer">
        <button class="aui-button" type="button" id="cancel-create-dialog">Cancel</button>
        <button class="aui-button aui-button-primary" type="submit">Create</button>
      </footer>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="./board.js"></script>
</body>
</html>
